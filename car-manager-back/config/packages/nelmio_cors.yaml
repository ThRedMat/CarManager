nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: ["%env(CORS_ALLOW_ORIGIN)%"]
        allow_methods: ["GET", "OPTIONS", "POST", "PUT", "PATCH", "DELETE"]
        allow_headers: ["*"] # <-- On autorise tous les en-tetes ici
        expose_headers: ["Link"]
        max_age: 3600
    paths:
        # On cree une regle specifique et ouverte pour toutes tes routes d'API
        "^/api/":
            allow_origin: ["*"]
            allow_headers: ["*"]
            allow_methods: ["GET", "OPTIONS", "POST", "PUT", "PATCH", "DELETE"]
            max_age: 3600
