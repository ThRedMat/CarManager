<div class="login-container">
  <div class="glass-card">
    <div class="header">
      <div class="icon">🚗</div>
      <h1>CarManager</h1>
      <p>Heureux de vous revoir.</p>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input
        type="text"
        placeholder="exemple@icloud.com"
        class="apple-input"
        [(ngModel)]="loginObj.email"
      />
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      <input
        type="password"
        placeholder="••••••••"
        class="apple-input"
        [(ngModel)]="loginObj.password"
      />
    </div>

    <button type="button" class="btn-apple" (click)="onLogin()">Se connecter</button>

    <div class="footer-links">
      <a routerLink="/register">Pas encore de compte ? <strong>S'inscrire</strong></a>
    </div>
  </div>
</div>
